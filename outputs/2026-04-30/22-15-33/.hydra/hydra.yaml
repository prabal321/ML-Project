hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - habitat_baselines.num_environments=1
    - habitat_baselines.total_num_steps=200000
    - habitat_baselines.num_checkpoints=4
    - habitat_baselines.log_interval=10
    - habitat_baselines.torch_gpu_id=-1
    - habitat_baselines.force_torch_single_threaded=True
  job:
    name: run
    chdir: null
    override_dirname: habitat_baselines.force_torch_single_threaded=True,habitat_baselines.log_interval=10,habitat_baselines.num_checkpoints=4,habitat_baselines.num_environments=1,habitat_baselines.torch_gpu_id=-1,habitat_baselines.total_num_steps=200000
    id: ???
    num: ???
    config_name: pointnav/ppo_pointnav_example.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /Users/prabalsharma/ml-project/habitat-lab
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /Users/prabalsharma/ml-project/habitat-lab/habitat-baselines/habitat_baselines/config
      schema: file
      provider: main
    - path: habitat.config
      schema: pkg
      provider: habitat
    - path: habitat_baselines.config
      schema: pkg
      provider: habitat
    - path: ''
      schema: structured
      provider: schema
    output_dir: /Users/prabalsharma/ml-project/habitat-lab/outputs/2026-04-30/22-15-33
    choices:
      habitat_baselines: habitat_baselines_rl_config_base
      benchmark/nav/pointnav: pointnav_habitat_test
      habitat/dataset/pointnav: habitat_test
      habitat/dataset@habitat.dataset.habitat.dataset: dataset_config_schema
      habitat/simulator/sensor_setups@habitat.simulator.agents.main_agent: rgbd_agent
      habitat/simulator/sim_sensors@habitat.simulator.agents.main_agent.sim_sensors.depth_sensor: depth_sensor
      habitat/simulator/sim_sensors@habitat.simulator.agents.main_agent.sim_sensors.rgb_sensor: rgb_sensor
      habitat/task: pointnav
      habitat: habitat_config_base
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
